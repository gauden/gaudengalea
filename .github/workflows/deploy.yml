name: Build and Deploy to Origin

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, ARM64, molly]
    permissions:
      contents: read
    env:
      CANONICAL_HOST: ${{ vars.CANONICAL_HOST }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT }}
      RELEASE_RETENTION: ${{ vars.RELEASE_RETENTION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lektor

      - name: Build site with Lektor
        run: lektor build --output-path .lektoroutput

      - name: Add CNAME
        run: |
          if [ -z "${CANONICAL_HOST}" ]; then
            echo "Missing repository variable CANONICAL_HOST"
            exit 1
          fi
          echo "${CANONICAL_HOST}" > .lektoroutput/CNAME

      - name: Validate required deployment settings
        run: |
          missing=0
          for name in DEPLOY_ROOT; do
            if [ -z "${!name}" ]; then
              echo "Missing required setting: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to origin host
        run: |
          set -euo pipefail

          release_retention="${RELEASE_RETENTION:-10}"
          release_id="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          release_dir="${DEPLOY_ROOT}/releases/${release_id}"
          current_link="${DEPLOY_ROOT}/current"

          mkdir -p "${DEPLOY_ROOT}/releases" "${release_dir}"
          rsync -az --delete .lektoroutput/ "${release_dir}/"
          test -s "${release_dir}/index.html"
          # Use a relative symlink so both host and container path views resolve.
          ln -sfn "releases/${release_id}" "${current_link}"
          find "${DEPLOY_ROOT}/releases" -mindepth 1 -maxdepth 1 -type d -printf '%P\n' | sort -r | tail -n +"$(( release_retention + 1 ))" | while read -r old; do
            rm -rf "${DEPLOY_ROOT}/releases/${old}"
          done
