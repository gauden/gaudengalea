# GENERATED by bin/reconcile-goaccess.sh from goaccess-sites.yaml
name: goaccess
services:
  powergraph-goaccess:
    image: allinurl/goaccess:latest
    container_name: powergraph-goaccess
    restart: unless-stopped
    command:
      - --log-format=CADDY
      - --real-time-html
      - --output=/report/index.html
      - --addr=0.0.0.0
      - --port=7890
      - --ws-url=wss://webstats.gaudengalea.com:443/powergraph/ws
      - /logs/access.json
    volumes:
      - /home/ubuntu/apps/caddy/data/access-powergraph.log:/logs/access.json:ro
      - /home/ubuntu/apps/caddy/data/goaccess/powergraph:/report
    networks:
      - caddy_default

  blog-goaccess:
    image: allinurl/goaccess:latest
    container_name: blog-goaccess
    restart: unless-stopped
    command:
      - --log-format=CADDY
      - --real-time-html
      - --output=/report/index.html
      - --addr=0.0.0.0
      - --port=7891
      - --ws-url=wss://webstats.gaudengalea.com:443/blog/ws
      - /logs/access.json
    volumes:
      - /home/ubuntu/apps/caddy/data/access-gaudengalea.log:/logs/access.json:ro
      - /home/ubuntu/apps/caddy/data/goaccess/blog:/report
    networks:
      - caddy_default

networks:
  caddy_default:
    external: true
